  "ボディパーカッション": { howto: "①ファシリテーターが基本リズムを提示：手拍子→膝叩き→足踏み（4拍ずつ）\n②全員で合わせて練習\n③グループを2〜3に分け、それぞれ異なるリズムパートを担当\n④パート別に練習した後、全員で合わせてアンサンブルにする\n⑤うまく重なったら、テンポを変えたりソロパートを入れたりしてアレンジ", aim: "全員で音楽を作る体験が一体感を生む。" },
  "カテゴリー指名": { howto: "①全員で円になる\n②ファシリテーターがカテゴリーを宣言（例：「果物！」）\n③同時に誰かを指名→指名された人は3秒以内にそのカテゴリーの答えを言う（例：「りんご！」）\n④答えた人が次のカテゴリーを宣言して別の人を指名\n⑤3秒以内に答えられない or 既出の答えを言ったらアウト→面白い罰ゲーム", aim: "即答力と場の活性化に最適。" },
  "スロー・モーション・レース": { howto: "①スタートラインに全員が並ぶ\n②「よーいドン」でスローモーションで歩き始める\n③ルール：常に片足が地面についていること。一番最後にゴールした人が勝ち\n④大げさなスローモーション表現（髪がなびく・汗が飛ぶ）を推奨\n⑤2回戦は「スローモーション障害物レース」にアレンジ", aim: "身体コントロールと静かな集中力を養う。" },
  "感情ウォーク": { howto: "①空間を自由に歩く\n②ファシリテーターが感情を告げる：「喜び」→歩き方・表情・姿勢が変わる\n③30秒ごとに感情が切り替わる：「怒り」→「悲しみ」→「恐怖」→「自信」→「恋」\n④次に感情の強度を指示：「喜び30%」→「喜び100%」\n⑤最後に2人で出会って、異なる感情同士で10秒間交流する", aim: "身体表現の幅を広げる。" },
  "アニマル・ウォーク": { howto: "①空間を自由に歩く\n②ファシリテーターが動物を指定：「猫」→全員が猫になって歩く\n③30秒ごとに動物を変える：「ゴリラ」→「ペンギン」→「ヘビ」→「ゾウ」\n④次に「2匹の動物が出会ったら挨拶する」ルール追加\n⑤最後は好きな動物を自分で選び、同じ動物同士が見つけ合ってグループを作る", aim: "身体の緊張をほぐしながら自己開示のハードルを下げる。" },
  "ハンズ・アップ": { howto: "①全員で立つ\n②ファシリテーターが質問する：「朝ごはんにパンを食べた人！」\n③当てはまる人が一斉に「はい！」と手を挙げる\n④質問を変えて繰り返す：「犬を飼っている人」「今日ワクワクしている人」\n⑤最後は参加者自身が質問を出す\n※意外な共通点が見つかるような質問を準備しておく", aim: "互いの意外な共通点が発見でき、場が瞬時に温まる。" },
  "ネームチェーン": { howto: "①全員で円になる\n②最初の人が自分の名前を言う：「まさしです」\n③次の人が前の人の名前＋自分の名前を言う：「まさしさんの隣の、ゆうこです」\n④どんどん連鎖して、最後の人は全員の名前を言う\n⑤全員で拍手！ 忘れたら周りがジェスチャーでヒントを出してOK\n⑥2周目は逆回りで挑戦", aim: "全員の名前を記憶するゲーム。助け合いが自然に生まれる。" },
  "タッチ＆ゴー": { howto: "①空間を自由に歩く\n②ファシリテーターが指示を出す：「壁にタッチ！」→全員が壁に触って戻る\n③指示を変えていく：「床」→「窓」→「誰かの肩」→「青いもの」→「3人で手を繋いで」\n④徐々にスピードを上げ、最後は連続指示\n⑤最後の人がタッチし終えたらみんなで拍手", aim: "身体をほぐし空間への意識を広げる。" },
  "ワン・トゥー・スリー交換": { howto: "①ペアで向かい合う\n②交互に「1」「2」「3」「1」「2」「3」…と数え続ける\n③慣れたら「1」を拍手に置き換える：「（パン）」「2」「3」\n④次に「2」をジャンプに：「（パン）」「（ジャンプ）」「3」\n⑤最後に「3」も動作に：全部が動作と音だけになる\n⑥ペアを変えて2〜3回繰り返す", aim: "脳と身体を同時にウォームアップ。" },
  "グループ彫刻": { howto: "①4〜6人のグループに分かれる\n②ファシリテーターがテーマを出す（例：「チームワーク」「挑戦」「信頼」）\n③グループで相談せず、一人ずつ順番に体でポーズを取って「彫刻」に加わる\n④全員が加わったら10秒間キープ→他のグループが鑑賞\n⑤鑑賞後、「何に見えたか」を共有\n⑥テーマを変えて2〜3回繰り返す\n※ポイント：相談なし＝相手の意図を読み取る力が試される", aim: "言葉を使わず、互いの意図を読み取る力を養う。" },
  "ブラインドウォーク": { howto: "①ペアを組む（A＝ガイド、B＝目を閉じる人）\n②Bが目を閉じ、Aが声だけでBを空間の中で誘導する\n③障害物（椅子など）を避けながら目的地まで導く\n④3〜5分で役割交代\n⑤終了後、ペアで振り返り：「どんな指示がわかりやすかった？」\n⑥全体共有：信頼とコミュニケーションについて気づきを話す", aim: "信頼関係の構築と、明確な指示の出し方を学ぶ。" },
  "マシーン（機械づくり）": { howto: "①ファシリテーターがテーマを出す（例：「洗濯機」「時計」「遊園地」）\n②一人が中央に出て、繰り返しの動きと音を始める（例：腕を回しながら「ガチャン」）\n③一人ずつ加わり、既存の動きに連動する動きと音を追加する\n④全員が機械の一部になったら、「スピードアップ！」→「スローダウン」→「ストップ！」\n⑤テーマを変えて2回目。今度は全員同時スタートで挑戦", aim: "チームの一体感と創造的協働を体験。" },
  "ステータスゲーム": { howto: "①参加者全員にトランプのカード（A〜10）を1枚ずつ配る（自分では見ない）\n②カードを額に貼り付ける（自分の数字は見えないが、他人の数字は見える）\n③パーティー会場という設定で自由に歩き回り、相手のカードの数字に応じた態度で接する\n④高い数字の人＝丁寧に、低い数字の人＝適当に扱う\n⑤5分後、「自分は何番だと思うか」順番に並ぶ\n⑥カードを見て答え合わせ→振り返り", aim: "組織内の力関係への気づきを得る。" },
  "シップ・イズ・シンキング": { howto: "①全員が空間を自由に歩く\n②ファシリテーターが「〇人組！」と叫ぶ（例：「3人組！」）\n③即座にその人数のグループを作る。余った人はアウト（応援係に）\n④次の号令まで、そのグループで簡単な課題をクリア（例：「3人で三角形のポーズ！」）\n⑤人数を変えながら5〜6回繰り返す\n⑥最後は全員で1つのグループを作って終了", aim: "瞬時の判断力と協力関係を楽しく鍛える。" },
  "エコーマシーン": { howto: "①全員で円になる\n②一人が中央に出て、シンプルな動きと声を繰り返す（例：手を叩きながら「ヘイ！」）\n③全員がそれをエコーのように繰り返す\n④中央の人が動きを変える→全員が即座に追従\n⑤30秒で交代、次の人が中央へ\n⑥全員が1回はリーダーを経験する", aim: "誰もがリードできることを実感する。" },
  "フリーズ・タグ（演劇版）": { howto: "①2人がステージに出て即興シーンを始める\n②外から誰かが「フリーズ！」と叫ぶ→2人はその姿勢で静止\n③叫んだ人がどちらか一人と交代し、静止ポーズから全く別のシーンを始める\n④繰り返し。誰でも「フリーズ！」と叫んで参加できる\n⑤5分間で全員が最低1回は参加することを目標にする", aim: "即興力とチームの連帯感を同時に鍛える。" },
  "バランス彫刻": { howto: "①ペアで向かい合い、両手を合わせてお互いの体重で支え合うポーズを作る\n②2ペアが合体して4人の彫刻に\n③4人が合体して8人に→最終的に全員で1つの大きな彫刻を作る\n④「一人が抜けたら崩れる」状態を体験する\n⑤全員で10秒キープできたら成功！拍手", aim: "相互依存とシステム思考を身体で理解する。" },
  "同期ムーブメント": { howto: "①全員で円になる\n②ルール：リーダーを決めずに、全員が同じ動きをすることを目指す\n③誰かがゆっくり動き始める→他の人が合わせていく\n④動きが一致したら、徐々に変化させていく\n⑤5分間、言葉なしで全員がシンクロすることを目指す\n⑥振り返り：「誰がリードしていた？」「どうやって合わせた？」", aim: "「リーダーなき一致」の難しさを体感。" },
  "ヒューマン・ノット": { howto: "①全員で密な円になる\n②目を閉じて手を伸ばし、ランダムに2人の手をつかむ（隣の人以外）\n③目を開けて、手を離さずに絡まりを解く\n④体をくぐったり、腕をまたいだりしながら、1つの円になることを目指す\n⑤制限時間5分。解けなくても「どこまで進んだか」を評価\n⑥振り返り：「誰がリードした？」「コミュニケーションの質は？」", aim: "チームの問題解決プロセスを浮き彫りにする。" },
  "ロープ・スクエア": { howto: "①全員が目隠しをする\n②1本の長いロープを全員で持つ\n③目隠しのまま、声だけでコミュニケーションを取りながらロープを正方形にする\n④「できた！」と思ったら全員で目隠しを外して確認\n⑤2回目は三角形に挑戦\n⑥振り返り：「どんな指示が有効だった？」「リーダーは自然に生まれた？」", aim: "声だけのコミュニケーションでチームの協力体制を可視化。" },
  "カウントダウン・チャレンジ": { howto: "①全員で円になり、アイコンタクトだけで20から1までカウントダウンする\n②ルール：声を出すタイミングが被ったら最初（20）からやり直し\n③相談やジェスチャーは禁止\n④成功するまで繰り返す（最初は10からスタートでもOK）\n⑤成功したらハイタッチ！→次は30に挑戦", aim: "究極の非言語チームワーク。" },
  "イエス・アンド": { howto: "①ペアで向かい合う\n②Aが提案する：「旅行に行こうよ」\n③Bは「はい、そして（Yes, And）…」で受けて発展させる\n④Aも「はい、そして…」で続ける\n⑤1分間続けたら、比較のため「いや、でも（No, But）」だけで会話する1分間を体験\n⑥両方の違いをペアで振り返り→全体共有", aim: "肯定的コミュニケーションの基本を体得する。" },
  "ワンワード・ストーリー": { howto: "①5〜8人のグループで円になる\n②一人一語ずつ順番に言葉を出して物語を紡ぐ\n③例：「むかし」→「ある」→「ところに」→「巨大な」→「ネコが」→「いました」\n④物語が一段落したら拍手で終了\n⑤2回目は「ビジネスプレゼン」「ホラー映画」などジャンル指定で挑戦", aim: "傾聴力と協調性を養う。" },
  "感情のスイッチ": { howto: "①ペアで向かい合う\n②シンプルなセリフを1つ決める（例：「今日はいい天気ですね」）\n③Aがそのセリフを「怒り」で言う→Bが同じセリフを「喜び」で返す\n④ファシリテーターが感情を指示：「悲しみ」→「興奮」→「退屈」→「恋」\n⑤同じセリフなのに全く違って聞こえることを体験\n⑥振り返り：言葉と感情どちらが強い？", aim: "非言語コミュニケーションの影響力を実感する。" },
  "アクティブリスニング・シーン": { howto: "①ペアで向かい合う\n②Aが何かの話題で話し始める\n③Bは相手のセリフの最後の言葉を自分のセリフの最初に使って返す\n④例：A「公園に行ったんだ」→B「行ったんだ、いいね。天気よかった？」\n⑤3分間続けたら役割交代\n⑥振り返り：「普段の会話と何が違った？」", aim: "深い傾聴を訓練する。" },
  "プレゼント・ゲーム": { howto: "①ペアで向かい合う\n②Aが見えない箱を差し出す：「プレゼントです」\n③Bが箱を開けて「わあ！○○だ！ありがとう！」と中身を決めて大喜びする\n④Aは「そう、あなたに似合うと思って」と受ける\n⑤役割交代して繰り返す\n⑥3回ずつやったら全体共有\n※ポイント：どんなものが出てきても全力で喜ぶこと", aim: "受容と感謝の姿勢を学ぶ。" },
  "クエスチョン・オンリー": { howto: "①ペアで向かい合う\n②会話をするが、使えるのは「質問」だけ。宣言文を言ったらアウト\n③場面設定をする（例：レストランの店員と客、上司と部下）\n④宣言文を言ってしまったらペアの相手と交代\n⑤5分間で何往復続けられるか挑戦", aim: "傾聴力と「相手への好奇心」を根本から鍛える。" },
  "通訳ゲーム": { howto: "①3人1組（話し手A・通訳B・聞き手C）\n②Aが架空の言語（デタラメ語）で情熱的に何かを語る（ジェスチャー付き）\n③Bがそれを日本語に「通訳」する（Aのジェスチャーと声のトーンから推測）\n④Cは通訳を聞いて質問する→Aがデタラメ語で回答→Bが通訳\n⑤2分で役割をローテーション\n⑥全員が3役を経験したら振り返り", aim: "コミュニケーションの意図と解釈のズレを楽しく実感。" },
  "感情翻訳": { howto: "①4〜6人のグループで円になる\n②一人が円の中央に立ち、感情だけで何かを伝える（言葉は使わない）\n③残りのメンバーが「翻訳」して言葉にする\n④中央の人が「正解」を明かす\n⑤全員が1回ずつ中央を経験\n⑥振り返り：「一番読み取りにくかった感情は？」", aim: "感情の読み取り力と共感力を鍛える。" },
  "ノー・バット vs イエス・アンド": { howto: "①ペアで向かい合う\n②テーマを決める（例：「社員旅行の計画」）\n③Round1：全て「いや、でも（No, But）…」で返す会話を2分間\n④Round2：全て「はい、そして（Yes, And）…」で返す会話を2分間\n⑤両方の体験を比較：「どちらが楽しかった？」「アイデアはどちらが広がった？」\n⑥全体共有：日常の会議でどちらが多いか振り返る", aim: "否定と肯定がもたらす会話の温度差を肌で感じる。" },
  "パーティー・クアークス": { howto: "①1人がホスト役。残りのゲストにはそれぞれ「秘密のクセ」カードを渡す\n②クセの例：「5分おきにダンスする」「すべてを陰謀論で説明する」\n③パーティーが始まり、ゲストはクセを演じながらホストと会話する\n④ホストは会話しながら各ゲストのクセを当てる\n⑤全員のクセを当てたらクリア", aim: "観察力・察する力を磨く。" },
  "サイレント・コンフリクト": { howto: "①ペアで場面設定をする（例：「遅刻した同僚と怒っている上司」）\n②ルール：一切言葉を使わずにシーンを演じる。使えるのは表情・身体・距離だけ\n③2分間のサイレントシーンを演じる\n④観客がどんな状況・感情に見えたかフィードバック\n⑤ペアで「何を伝えようとしたか」を共有", aim: "非言語コミュニケーションの極致。" },
  "バックトゥバック・トーク": { howto: "①ペアで背中合わせに座る（顔が見えない状態）\n②お題について3分間会話する\n③3分後、向かい合って同じお題で3分間会話する\n④振り返り：「背中合わせと対面で何が違った？」\n⑤全体共有：電話・メール・対面の違いについてディスカッション", aim: "声のトーンと言葉選びの重要性を体感。" },
  "ディレクターズチェア": { howto: "①4人グループ（演出家1人＋俳優3人）\n②シンプルな場面設定を渡す（例：「引っ越しの朝」）\n③演出家が俳優に指示を出してシーンを作る：配置・動き・セリフ・感情\n④3分間のシーンを仕上げて発表\n⑤観客からフィードバック。演出家に「指示のわかりやすさ」を5段階評価\n⑥演出家を交代して2回目", aim: "ビジョンの伝え方とフィードバックの出し方を実践。" },
  "フォロー・ザ・リーダー": { howto: "①全員で円になる\n②1人が部屋の外に出る（探偵役）\n③残りの中からリーダーを1人決める\n④リーダーがさりげなく動きを変え、全員がコピーする\n⑤探偵役が戻り、円の中央に立って「誰がリーダーか」を当てる（3回まで）\n⑥リーダーは探偵に気づかれないよう動きを変えるタイミングを工夫", aim: "影響力と観察力を同時に鍛える。" },
  "ホットシーティング": { howto: "①1人が椅子に座り「架空のリーダー役」になりきる\n②残りの参加者が自由に質問する\n③座っている人は即興で一貫した答えを返す\n④5分間質疑応答→交代\n⑤終了後、全体で振り返り：「どの回答が説得力があった？」", aim: "即座の判断力と一貫性のある発言力を磨く。" },
  "コーラス・ライン": { howto: "①1列に並ぶ。先頭がリーダー\n②リーダーが動き始め、全員がコピーして一列でついていく\n③30秒でリーダーが列の最後尾に回り、先頭の新しいリーダーが動きを変える\n④全員がリーダーを1回経験するまで繰り返す\n⑤振り返り：「リードするとき何を考えた？」", aim: "導く側・従う側両方の感覚を知る。" },
  "タウンミーティング劇場版": { howto: "①参加者全員に役割カードを配る（市長・商店主・教師・学生・医師など）\n②架空の議題を発表\n③各自が役割の立場で5分間準備\n④市長役がファシリテーターとなり、タウンミーティングを開催（15分間）\n⑤賛成・反対の議論を経て、最終的に投票で決議\n⑥振り返り：「合意形成のポイントは？」", aim: "合意形成のプロセスを体験。" },
  "ロールリバーサル": { howto: "①ペアで「上司と部下」の場面設定をする\n②まず通常の役割でシーンを3分間演じる\n③次に役割を完全に入れ替えて同じシーンを3分間演じる\n④相手の立場で演じて初めて気づいたことをペアで共有\n⑤全体で振り返り", aim: "逆の立場で相互理解と共感力が深まる。" },
  "意思決定シーン": { howto: "①3〜5人のグループ。1人がリーダー役\n②危機的状況カードを引く\n③リーダー役が5分以内に情報収集して決断を下す\n④決断後、その根拠をメンバーに説明する\n⑤メンバーがリーダーの判断プロセスを5段階で評価\n⑥リーダーを交代して別のシナリオで繰り返す", aim: "判断プロセスを全員で評価する。" },
  "ビジョン・キャスティング": { howto: "①1人がリーダー役。残りがチームメンバー\n②リーダーが3年後のチームのビジョンを2分間でスピーチする\n③メンバーはそのビジョンが実現した世界を即興で演じる\n④演じたシーンを見て、リーダーが合っているかフィードバック\n⑤合っていなければビジョンを修正して再スピーチ", aim: "伝わるビジョンとは何かを学ぶ。" },
  "ワンマン・バンド": { howto: "①1人がバンドリーダー（指揮者）。残りがバンドメンバー\n②メンバーそれぞれに楽器を割り当てる（声と身体で表現）\n③リーダーが指揮で合図：「ドラムだけ！」→「ベース追加！」→「全員！」→「ストップ！」\n④音量・テンポ・ソロパートもリーダーがジェスチャーで指示\n⑤3分の即興演奏を完成させる\n⑥リーダーを交代", aim: "明確さがチームを左右する体験。" },
  "ゴースト・リーダー": { howto: "①1人がリーダー役。チームに課題を出す\n②リーダーが方針と段取りを30秒で伝える\n③リーダーが退場。残ったメンバーだけで課題を遂行する（3分間）\n④リーダーが戻って結果を確認。フィードバック\n⑤振り返り：「リーダーの指示で足りなかったことは？」\n⑥リーダーを交代して別の課題で繰り返す", aim: "自走するチームの要件を考える。" },
  "エレベーターピッチ即興": { howto: "①お題カードを引く（例：「空飛ぶ靴」「食べられる本」）\n②30秒の準備時間\n③30秒間でそのアイデアの魅力を全力プレゼンする\n④聴衆が「投資したい度」を5段階で評価\n⑤全員が1回ずつ挑戦\n⑥トップ3の人が決勝戦", aim: "瞬発力と説得力のある話し方を訓練。" },
  "感情スピーチ": { howto: "①お題を1つ決める（例：「朝ごはんについて」）\n②最初は「普通に」1分間スピーチする\n③2回目は「怒りながら」同じ内容をスピーチ\n④3回目は「泣きながら」→4回目は「大爆笑しながら」\n⑤聴衆が各バージョンの印象を共有\n⑥振り返り：感情が聴衆に与える影響の大きさを確認", aim: "声・表情・身体が聴衆に与える印象の違いを体感。" },
  "エキスパート・ゲーム": { howto: "①1人が「架空の専門家」としてステージに立つ\n②聴衆がランダムなテーマを決める（例：「宇宙クジラの生態」）\n③専門家役は堂々とプレゼンする（全て即興でデタラメOK）\n④聴衆が本気の質疑応答をする。専門家は一貫性を保ちながら回答\n⑤3分間やったら交代", aim: "知らないことでも堂々と話すプレゼン度胸をつける。" },
  "ストーリーテリング・リレー": { howto: "①5〜8人が一列に並ぶ\n②お題を決める（例：「ある起業家の成功物語」）\n③最初の人が物語の導入を1分間語る\n④ファシリテーターが「チェンジ！」→次の人が続きを引き継ぐ\n⑤全員が1回ずつ語り、最後の人がクライマックスと結末を担当\n⑥聴衆が「物語の完成度」をフィードバック", aim: "構成力・展開力・聴衆を引き込む話術を磨く。" },
  "TED風3分プレゼン": { howto: "①テーマを決める（ワークショップの学び・仕事の気づき・人生の転機など）\n②10分間で構成を考える：オープニング→本題→メッセージ\n③3分間のプレゼンを実施。立って、聴衆の目を見て話す\n④聴衆がフィードバックシートに記入：声・構成・感動（各5点）\n⑤フィードバックを共有\n⑥希望者は修正版を2回目に挑戦", aim: "全エクササイズの集大成として実施。" },
  "ニュースキャスター": { howto: "①1人がニュースキャスター役でデスクに座る\n②ランダムなトピックカードを引く\n③即興で「速報です！」から始めてニュースを読む（1分間）\n④途中でフロアレポーター役に中継を振る→レポーターも即興\n⑤スタジオに戻ってまとめのコメント\n⑥全員が1回ずつキャスターを経験", aim: "明確な発声と落ち着きを体験。" },
  "逆説プレゼン": { howto: "①テーマカードを引く（例：「残業は素晴らしい」）\n②2分間の準備\n③1分間で情熱的にプレゼンする（本気で説得するつもりで）\n④聴衆が「説得された度」を5段階評価\n⑤振り返り：「反対の立場を本気で考えると何が見えた？」\n⑥実際のビジネスでの応用について議論", aim: "多角的思考と説得技術を磨く。" },
  "身体だけで伝える": { howto: "①お題カードを引く（例：「新商品の発表」「チームの目標」）\n②言葉を一切使わず、ジェスチャー・表情・身体の動きだけで伝える（2分間）\n③聴衆が「何を伝えようとしていたか」を当てる\n④次に同じ内容を言葉ありでプレゼンする\n⑤両方を比較", aim: "非言語コミュニケーション力を開発。" },
  "物語の構造プレゼン": { howto: "①「英雄の旅」の構造を説明：日常→冒険への誘い→試練→成長→帰還\n②自分の成功体験をこの構造に当てはめて整理する（10分間）\n③3分間のプレゼンを実施：「私の冒険の物語」\n④聴衆がフィードバック：「どの場面で心が動いた？」\n⑤振り返り：ストーリーテリングで感情を動かす技術を整理", aim: "ストーリーテリングで感情を動かす技術を習得。" },
  "スピードプレゼン・バトル": { howto: "①トーナメント表を作成\n②2人ずつ対戦。お題カードを同時に引く\n③30秒の準備後、1分間ずつスピーチ\n④聴衆の拍手の大きさで勝敗を決定\n⑤勝ち残り方式でトーナメントを進行\n⑥決勝戦は特別お題で2分間スピーチ\n⑦優勝者を全員で称える", aim: "楽しさの中でプレゼンの恐怖を解消。" },
  "感情マッピング": { howto: "①静かな音楽を流す。全員が目を閉じて立つ\n②ファシリテーターが問いかける：「今、身体のどこに感情を感じますか？」\n③感じる場所に手を当てる\n④その感情を小さな動きで表現し始める→徐々に大きくする\n⑤目を開け、2〜3人のグループで「どこに何を感じたか」をシェア\n⑥全体で振り返り", aim: "自己認識と感情知性を高める。" },
  "内なる批評家 vs 応援団": { howto: "①ペアを組む（A＝批評家、B＝応援団）\n②テーマを決める（例：「新しいことに挑戦したい」）\n③Aが否定的な声を言う：「どうせ無理だよ」\n④Bが肯定的に返す：「失敗しても大丈夫」「あなたならできる」\n⑤3分間やったら役割交代\n⑥振り返り：「どちらの声が普段強い？」", aim: "セルフトークの影響を客観視する。" },
  "コンフォートゾーン・チャレンジ": { howto: "①3つのゾーンを説明：コンフォート→ストレッチ→パニック\n②段階的にチャレンジ：Level1「全員の前で好きなものを叫ぶ」\n③Level2「即興で30秒のスピーチ」\n④Level3「変な踊りを全力でやる」\n⑤Level4「自分の弱みを1つ正直に言う」\n⑥各レベル後に「今の自分はどのゾーン？」をチェック", aim: "安全な場で快適圏を広げる体験をする。" },
  "フューチャーセルフ対話": { howto: "①ペアを組む（A＝今の自分、B＝5年後の自分）\n②Bは5年後の自分になりきって椅子に座る\n③Aが質問する：「5年後、何をしてますか？」「アドバイスは？」\n④Bは5年後の視点から即興で回答する\n⑤5分間やったら役割交代\n⑥個人ワーク：対話で気づいたことをメモ\n⑦全体で振り返り", aim: "目標設定と自己対話の力を養う。" },
  "感情の彫刻": { howto: "①感情カードを引く（怒り・喜び・不安・誇りなど）\n②その感情を身体の「彫刻」（静止ポーズ）で表現する\n③全員がポーズを取ったら、ギャラリーウォーク（展覧会のように鑑賞）\n④鑑賞者は「これは何の感情に見えるか」を当てる\n⑤作者が正解を発表\n⑥振り返り：「同じ感情でも人によって表現が違う。なぜ？」", aim: "自己理解を深める。" },
  "リフレーミング・シーン": { howto: "①個人ワーク：過去の「失敗体験」を1つ思い出す\n②ペアを組む。失敗体験をまず「悲劇」として2分間演じる\n③次に同じ体験を「成長物語」として2分間演じ直す\n④Bが両バージョンの違いをフィードバック\n⑤役割交代\n⑥振り返り：「語り方で何が変わった？」", aim: "語り方で意味が変わることを体感する。" },
  "ロールモデル・ウォーク": { howto: "①尊敬する人を1人思い浮かべる\n②その人になりきって空間を歩く：歩き方・姿勢・表情を真似する\n③2人で出会ったら、なりきったまま挨拶・会話する\n④3分後、自分に戻って「何が変わったか」を感じる\n⑤ペアで共有\n⑥振り返り：「その人の要素で自分にも取り入れられることは？」", aim: "尊敬する人を借りることで自分の新たな可能性を発見。" },
  "感謝の劇": { howto: "①個人ワーク：感謝したい人を1人思い浮かべ、エピソードを1つ選ぶ\n②ペアを組む。Aが感謝したい人との場面を再現する（Bが相手役）\n③場面の最後に、台本なしで感謝の言葉を直接伝える\n④役割交代\n⑤全体で円になり、一人ずつひと言で共有\n⑥静かな音楽で締めくくり", aim: "台本なしの言葉と行動が感情表現の質を高める。" },
  "感情のカラーパレット": { howto: "①色カード（赤・青・黄・緑・紫・オレンジ・黒・白）を用意\n②「今の自分の感情に一番近い色」を1枚選ぶ\n③その色の感情を身体で表現する（ポーズ＋動き＋音）\n④同じ色を選んだ人同士でグループになり、表現を見せ合う\n⑤全グループが発表\n⑥振り返り", aim: "感情の多様性を認め合う力を育む。" },
  "セルフコンパッション・シーン": { howto: "①ペアを組む。最近自分を責めた出来事を1つ思い出す\n②Aが自分を責める言葉を声に出す\n③Bがその言葉を「大切な友人に言い換えて」伝える\n④Aは友人バージョンの言葉を受け取り、どう感じるか共有\n⑤役割交代\n⑥振り返り：「自分には厳しく、友人には優しい。なぜ？」", aim: "自分への優しさを演劇で実践する。" },
  "ストレス彫刻→解放": { howto: "①目を閉じて、最近ストレスを感じた場面を思い出す\n②そのときの身体の状態を「彫刻」として表現する\n③10秒キープ→合図で一気に「解放のポーズ」に変える\n④解放のポーズで3回深呼吸\n⑤ペアで彫刻と解放のポーズを見せ合う\n⑥振り返り", aim: "身体からの自己ケアを体験。" },
  "なりきり自己紹介": { howto: "①全員で円になる\n②お題を選ぶ：「10年後の自分」「好きなキャラクター」など\n③一人ずつ、そのキャラになりきって自己紹介する（30秒）\n④全員が発表したら、一番「なりきれてた人」に拍手\n⑤振り返り", aim: "普段と違う一面を見せ合い、クラスの相互理解を促す。" },
  "フリーズフレーム発表": { howto: "①4〜6人グループに分かれる\n②授業で学んだ内容のテーマを渡す\n③グループで相談し、その場面をフリーズフレームで表現\n④各グループが発表。他のグループは「何の場面か」を当てる\n⑤正解発表後、静止画を「少し前」「少し後」に動かしてストーリーにする", aim: "体験として学びを定着させる。" },
  "ペア・ストーリーテリング": { howto: "①ペアで向かい合う\n②「むかしむかし…」から始めて、交互に一文ずつ物語を作る\n③ルール：前の人の文を否定しない\n④3分間でどこまで話が広がるか挑戦\n⑤面白い物語ができたペアに全体の前で発表してもらう\n⑥ペアを変えて2回目", aim: "創作力と傾聴力が同時に育つ。" },
  "感情の天気予報": { howto: "①全員で円になる\n②一人ずつ「今日の自分の天気」を発表する\n③天気を身体で表現する\n④同じ天気の人同士でグループになり、理由をシェア\n⑤全体で共有\n⑥最後に全員で「虹」のポーズを作って終了", aim: "思春期の複雑な感情に言葉以外の出口を与える。" },
  "教科書シーン化": { howto: "①4〜6人グループに分かれる\n②教科書の内容を1つ割り当てる\n③グループで5分間準備\n④各グループが2〜3分の即興劇として発表\n⑤観客が「一番分かりやすかった説明」をフィードバック\n⑥振り返り", aim: "演じて覚えるアクティブラーニング。" },
  "SNSトラブル・ロールプレイ": { howto: "①シナリオカードを配る\n②4人グループで役割を決める：投稿者・被害者・傍観者・仲裁者\n③シーンを3分間演じる\n④全員で役割をローテーション\n⑤各立場で感じたことをグループで共有\n⑥全体振り返り", aim: "情報モラルを体感的に学ぶ。" },
  "夢プレゼン": { howto: "①将来の夢を1分間考える\n②全員の前で1分間「夢プレゼン」する\n③ルール：聞いている人は全力で応援\n④否定やツッコミは一切禁止\n⑤全員が発表\n⑥振り返り", aim: "人前で話す恐怖を安全に克服する。" },
  "多様性体験シーン": { howto: "①シナリオカードを配る\n②4人グループで5分間準備し、3分間の即興シーンを作る\n③演じた後、「その人の世界で一番大変だったこと」を共有\n④他のグループの発表を観劇\n⑤全体振り返り\n⑥各自が「今日から1つ変えること」を書いて壁に貼る", aim: "多様性への理解を深める。" },
  "拍手リレー・チャレンジ": { howto: "①全員で円になる\n②スタートの人が隣の人に拍手→一周\n③タイムを計測\n④「もっと早くするには？」を作戦会議（1分）\n⑤2回目に挑戦→タイムを比較\n⑥作戦会議→3回目で最速タイムを目指す", aim: "記録更新という目標で団結力を引き出す。" },
  "ことわざジェスチャー": { howto: "①2チームに分かれる\n②出題者がことわざカードを引く\n③出題者は言葉を使わず身体だけで表現する\n④チームメイトが30秒以内に当てたら1ポイント\n⑤交互に出題して合計10問\n⑥ポイントが多いチームの勝ち", aim: "楽しく体で覚える国語力アップ。" },
  "未来の自分インタビュー": { howto: "①ペアを組む（A＝インタビュアー、B＝10年後の自分）\n②Bは10年後の自分になりきる\n③Aがインタビューする\n④5分間のインタビュー後、役割交代\n⑤個人ワーク：「未来の自分が教えてくれたこと」を書き出す\n⑥全体共有", aim: "進路やキャリアについて新たな気づきが生まれる。" },
  "教室シーン・リプレイ": { howto: "①教員Aが実際の教室での困りごとを共有\n②その場面を他の参加者と共に再現する（2分間）\n③「フリーズ！」→別のアプローチを試す\n④3つの異なるアプローチを試す\n⑤観察者がフィードバック\n⑥振り返り", aim: "安全な場で「もう一つの選択肢」を体験。" },
  "生徒目線ロールプレイ": { howto: "①教員4〜6人がグループを作る\n②1人が「先生役」で模擬授業の冒頭5分をやる\n③残りは全員「生徒役」（役割カード付き）\n④模擬授業を実施\n⑤「生徒役」を演じた感想を共有\n⑥先生役にフィードバック→次の人が挑戦", aim: "生徒視点で授業改善のヒントを得る。" },
  "保護者面談シミュレーション": { howto: "①ペアを組む（教員役＋保護者役）\n②シナリオカードを引く\n③保護者役は感情的な発言も含めてリアルに演じる\n④3分間の面談を実施\n⑤観察者がフィードバック\n⑥役割を変えて別のシナリオで繰り返す", aim: "想定外の発言への対応力を鍛える。" },
  "職員会議ファシリテーション": { howto: "①参加者に役割カードを配る\n②架空の議題を発表\n③ファシリテーター役が会議を進行（15分間）\n④紛糾した場合の対処法を実践\n⑤最終的に何らかの結論を出す\n⑥振り返り", aim: "合意形成に導くファシリテーション力を演習。" },
  "教員チーム・マシーン": { howto: "①全員で1つの「学校という機械」を作る\n②一人ずつ中央に出て、自分の役割を動きと音で表現しながら加わる\n③全員が機械の一部になったら10秒間稼働\n④ファシリテーターが1人を「故障」させる→全体への影響を観察\n⑤振り返り", aim: "各自の役割・つながりを可視化する。" },
  "叱り方ワークショップ": { howto: "①シナリオを1つ設定\n②参加者Aが「いつもの叱り方」で対応する（1分間）\n③参加者Bが「別の叱り方」で対応する\n④参加者Cが叱らずに対応する方法を試す\n⑤生徒役が「一番響いた対応」をフィードバック\n⑥全体で振り返り", aim: "生徒への声かけの選択肢を広げ、自分の癖に気づく。" },
  "授業オープニング3連発": { howto: "①教科と単元を1つ決める\n②同じ授業の最初の3分を3つの異なるスタイルで演じる：説明型・対話型・アクティブ型\n③各スタイルを生徒役が「引き込まれ度」で5段階評価\n④振り返り", aim: "授業導入のバリエーションを増やす。" },
  "多様な生徒への対応シーン": { howto: "①シナリオカードを引く\n②2人が教員役と生徒役でシーンを演じる（3分間）\n③観察者がフィードバック\n④同じシナリオで別のアプローチを試す\n⑤全体振り返り\n⑥各自が「明日から実践する1つ」を宣言", aim: "インクルーシブ教育の実践力を高める。" },
  "シーンスタディ": { howto: "①短い脚本の一場面を配布する\n②黙読し、登場人物の目的・関係性・転換点を分析する\n③分析結果をグループで共有（5分）\n④ペアで実際に演じる\n⑤1回目→フィードバック→2回目で改善\n⑥振り返り", aim: "テキスト分析力を鍛える。" },
  "キャラクター・ホットシート": { howto: "①キャラクターを1人決める\n②椅子に座り、そのキャラクターになりきる\n③他の部員がキャラクターに質問する\n④台本にない質問にも即興で回答する\n⑤5分間のQ&A後、全員で共有\n⑥振り返り", aim: "役の内面を深く掘り下げる。" },
  "エチュード（即興劇）": { howto: "①ペアまたは3人組を作る\n②状況カードを引く：「場所」「人物の関係」「目的」の3要素のみ\n③この設定だけで即興シーンを3分間演じる\n④観客からフィードバック\n⑤設定を変えて2〜3回繰り返す", aim: "台本に頼らず「その場で生きる」演技力を育てる。" },
  "テーブルリーディング": { howto: "①台本を全員に配布。椅子に座ったまま輪になる\n②役を割り振り、声に出して読み合わせる\n③1回目：素直に読む\n④気づいたことを共有\n⑤2回目：気づきを反映して読む\n⑥振り返り", aim: "声だけでキャラクターの違いを表現する力を磨く。" },
  "ブロッキング入門": { howto: "①短いシーンを用意\n②まず「立ち位置を考えずに」演じる\n③次に立ち位置を再設計する：客席からの見え方・関係性を距離で表現・移動タイミング\n④新しいブロッキングで演じ直す\n⑤客席から見ての違いをフィードバック", aim: "空間を使った演出の基礎を学ぶ。" },
  "感情リコール": { howto: "①静かな環境で目を閉じ、過去の強い感情体験を1つ思い出す\n②記憶の細部を呼び起こす：場所の匂い・音・温度\n③感情が身体に戻ってきたら、ゆっくり目を開ける\n④その感情を持ったまま、シンプルなセリフを言う\n⑤パートナーがフィードバック\n※注意：トラウマ的な記憶は避けること", aim: "演技のリアリティを追求。" },
  "アンサンブル・ワーク": { howto: "①全員で空間を歩く\n②指示：「全員が同じスピードで歩く」→「同時に止まる」→「同時に歩き出す」\n③「全員の呼吸を合わせる」\n④「全員で一つの生き物として動く」\n⑤最後に音楽をかけ、全員で統一された動きを創作する\n⑥振り返り", aim: "舞台上の一体感とチームワークを体で覚える。" },
  "モノローグ練習": { howto: "①各自がモノローグのセリフを1つ選ぶ\n②まず暗記→何も考えずに声に出す（1回目）\n③考える：誰に語っている？何を伝えたい？感情の変化は？\n④2回目：感情と意図を込めて演じる\n⑤パートナーがフィードバック\n⑥3回目：最終版を演じる", aim: "独白シーンの表現力と度胸を養う。" },
  "空間を使った演出": { howto: "①短いシーンを用意する\n②パターンA：近距離で演じる\n③パターンB：舞台の端と端で演じる\n④パターンC：1人が高い位置、もう1人が低い位置で演じる\n⑤観客が3パターンの印象の違いをフィードバック\n⑥振り返り", aim: "立ち位置と距離が意味を変えることを体感。" },
  "観客を意識する": { howto: "①短いシーンを演じる（1回目）：自然に演技\n②2回目：客席を意識して演じる（声量・体の開き・視線）\n③観客が「見やすさの違い」をフィードバック\n④3回目：自然さと見やすさの両立に挑戦\n⑤振り返り", aim: "客席への届け方を徹底訓練。" },
  "リアクション・トレーニング": { howto: "①ペアでシーンを設定\n②Aがセリフを言う。Bはリアクションだけ\n③Bは表情・呼吸・身体の動きだけで反応する\n④30秒間のリアクションを観客が観察\n⑤フィードバック\n⑥役割交代して繰り返す", aim: "相手のセリフを「聞く」技術を磨く。" },
  "ジャンル別即興シーン": { howto: "①設定を1つ決める\n②ジャンルカードを引いて演じる：ロマンティックコメディ→ホラー→刑事ドラマ→ミュージカル\n③各ジャンルで3分間の即興シーンを演じる\n④観客が「一番ハマっていたジャンル」を投票\n⑤振り返り", aim: "表現の引き出しを一気に広げる。" },
  "腹式呼吸トレーニング": { howto: "①仰向けに寝て両手をお腹に置く\n②鼻から4秒かけて息を吸い、お腹が膨らむのを確認\n③口から8秒かけてゆっくり吐き、お腹がへこむのを確認\n④5回繰り返したら立ち上がり、同じ腹式呼吸を立った状態で行う\n⑤最後に「あー」と声を出しながら腹式で息を吐き、声の響きの違いを体感する", aim: "声の土台となる腹式呼吸を身につける。安定した発声と声量アップの基礎。" },
  "五十音発声練習": { howto: "①姿勢を正し、肩の力を抜いて立つ\n②「あえいうえおあお」を一音ずつはっきり、大きな口で発声\n③「かけきくけこかこ」〜「わ行」まで全行を繰り返す\n④慣れたらテンポを上げて2周目\n⑤最後にペアで向かい合い、相手に届く声量で発声し合う", aim: "滑舌と声量を鍛え、明瞭な発声を身につける。稽古冒頭のウォームアップに最適。" },
  "早口言葉チャレンジ": { howto: "①代表的な早口言葉を5つ用意（例：生麦生米生卵、隣の客はよく柿食う客だ等）\n②まず全員でゆっくり正確に読む\n③徐々にスピードを上げて3回繰り返す\n④ペアになり、交互に早口言葉を言い合う\n⑤最後にペア対抗で早口言葉リレー（一人ずつ言って次の人にバトンタッチ）", aim: "滑舌力を楽しく鍛える。ペア練習で互いのフィードバックが得られる。" },
  "ピンポンパンゲーム": { howto: "①全員で円になる\n②最初の人が隣の人に「ピン」→次の人が「ポン」→次の人が「パン！」と言いながら円の中の誰かを指差す\n③指された人から再び「ピン」「ポン」「パン」が始まる\n④間違えた人は円の外に出て応援係に\n⑤慣れたら「ピン・ポン・パン・ポン」の4拍バージョンに挑戦", aim: "集中力と反射神経を楽しく鍛えるシアターゲームの定番。" },
  "だるまさんが転んだ（感情版）": { howto: "①鬼を1人決め、壁に向かって立つ\n②ファシリテーターが感情を指定する（例：「怒り」）\n③鬼が「だるまさんが怒った！」と言い振り返る\n④動いている人は「怒り」の感情を表現したポーズで静止\n⑤感情が表現できていないと判断されたら最初に戻る\n⑥感情は毎回変える（悲しみ・喜び・恐怖・驚き等）", aim: "指定された感情を瞬時に身体で表現する力を養う。" },
  "スペースウォーク": { howto: "①空間を自由に歩く（全体にまんべんなく広がることを意識）\n②ファシリテーターが速度を指示：「1（超ゆっくり）〜10（全速力）」\n③次に環境を指示：「砂漠」「氷の上」「ジャングル」等\n④次に感情を追加：「砂漠で喜んでいる」「氷の上で怒っている」\n⑤「STOP」で全員が瞬時に静止→5秒キープ→再開\n⑥最後に2人で出会って5秒間アイコンタクト", aim: "舞台上の空間認識力と身体表現の柔軟性を養う。" },
  "ステータスゲーム": { howto: "①1〜10の数字カードを用意し、各自1枚引く（他の人に見せない）\n②数字＝社会的地位の高さ（10が最高、1が最低）\n③2〜3人組で日常的な場面（カフェ、オフィス等）を設定し即興会話\n④自分の数字に合ったステータスで振る舞う\n⑤終了後、観客が各人の数字を当てる\n⑥当たったら成功→振り返りで「何がステータスを表現していたか」を共有", aim: "社会的地位を身体・声・態度で表現する役作りの基礎を学ぶ。" },
  "ワンワードストーリー": { howto: "①全員で円になる\n②最初の人が物語の一語目を言う（例：「ある」）\n③次の人が二語目（例：「日」）→次の人（例：「森の」）と続く\n④一人一語ずつ順番に回し、即興で物語を紡いでいく\n⑤5分間続けたら終了。どんな物語ができたか振り返る\n⑥2回目は「起承転結」を意識して挑戦", aim: "即興力と協調性を鍛える。前の人の言葉を受け入れる力を養う。" },
  "フリーズタグ（即興劇）": { howto: "①2人がステージに出て即興でシーンを演じ始める\n②外にいるメンバーが好きなタイミングで「フリーズ！」と叫ぶ\n③2人はその瞬間のポーズで静止\n④叫んだ人がどちらか1人の場所とポーズを引き継ぎ、まったく別のシーンを始める\n⑤これを繰り返し、全員が最低1回は参加する", aim: "即興力と創造力を鍛える。他の人のポーズから新しい発想を生み出す力を養う。" },
  "感情のスケール練習": { howto: "①短いセリフを1つ選ぶ（例：「おはようございます」）\n②感情を1つ指定（例：怒り）\n③レベル1（ほんの少し怒り）から演じ始め、レベル10（激怒）まで段階的に上げる\n④各レベルで同じセリフを言い、声量・表情・身体の変化を意識\n⑤次に別の感情（悲しみ・喜び等）で同様に練習\n⑥ペアで互いにレベルを当て合う", aim: "感情表現の幅と強弱のコントロール力を身につける。" },
  "ホットシーティング": { howto: "①台本の登場人物を1人選び、演じる人が椅子に座る\n②その人は役として椅子に座り続ける（本人ではなくキャラクターとして）\n③他のメンバーが自由に質問を投げかける（「子供の頃の夢は？」「一番怖いものは？」等）\n④役の人は台本にない内容も即興で答える\n⑤10分間続けたら振り返り：どんな新しい発見があったか共有", aim: "役の背景や内面を深掘りし、キャラクターの人物像を立体的に理解する。" },
  "ボディスカルプチャー": { howto: "①3〜5人のグループに分かれる\n②テーマを発表（例：「戦争」「友情」「孤独」「祭り」）\n③30秒間相談し、テーマを身体だけで表現する彫刻のようなポーズを作る\n④全グループが順番に発表→観客はテーマを当てる\n⑤同じテーマで2回目を作り、1回目との違いを比較\n⑥振り返り：言葉を使わずに伝える難しさと面白さを共有", aim: "言葉を使わず身体だけで意味を伝える表現力と創造力を養う。" },
  "サウンドスケープ": { howto: "①グループ（5〜8人）に分かれる\n②場面テーマを決める（例：「森の朝」「都会の夜」「嵐の海」）\n③声・手拍子・足踏み・口笛等、体から出る音だけで場面の音風景を作る\n④一人ずつ音を追加し、全員が加わったら1分間キープ\n⑤ファシリテーターの合図で音量を上げ下げ（クレッシェンド・デクレッシェンド）\n⑥他グループに発表→聞いた人がテーマを当てる", aim: "チームワークと音の創造力を強化。舞台の音響効果への理解も深まる。" },
  "ミラーリング（演劇版）": { howto: "①ペアで向かい合って立つ\n②Aがリーダー、Bがゆっくりとした動きを鏡のように真似する（1分間）\n③合図で役割交代（1分間）\n④次の段階：リーダーを決めずに2人で自然に動く（どちらが主導かわからない状態を目指す）\n⑤最後に4人グループに拡大し、全員がリーダーなしで動く\n⑥振り返り：「一体感を感じた瞬間」を共有", aim: "観察力と同調性を高め、相手の微細な動きを感じ取る力を養う。" },
  "チェックアウト・サークル": { howto: "①全員で円になる\n②一人ずつ順番に「今日の気づき」を一言で共有する\n③ルール：長く話さない（1人30秒以内）\n④全員が話し終えたら、全員で深呼吸を1回\n⑤ファシリテーターが「今日はありがとうございました」で締める", aim: "学びの定着と一体感を生む。" },
  "ワンワード・リフレクション": { howto: "①全員で円になる\n②「今日の体験を一言で表すと？」→一人ずつ単語を1つだけ言う\n③全員が言い終わったら、もう一周：「明日から持ち帰る一言は？」\n④最後に全員で深呼吸して終了", aim: "シンプルだが深い振り返りになる。" },
  "グループ・フリーズフレーム": { howto: "①全員で「今日の体験を一枚の写真にするなら？」を考える\n②せーの！で全員がポーズを取る\n③10秒キープ→ファシリテーターが撮影\n④もう1パターン作成\n⑤写真を見せ合って終了", aim: "今日の学びを全員で一つのポーズとして表現。" },
  "感謝のギフト": { howto: "①ペアで向かい合う\n②Aが「見えないギフト」を両手で丁寧にBに渡す\n③Bがそれを受け取り、「ありがとう。これは○○ですね」と中身を決める\n④Aが「はい、今日のあなたにぴったりだと思って」と返す\n⑤役割交代\n⑥全体で共有", aim: "今日の体験への感謝を形にする。" },
  "アプレシエーション・サークル": { howto: "①全員で円になる\n②一人ずつ隣の人に向かって具体的な感謝を言う\n③抽象的ではなく具体的に\n④一周したら全員で拍手", aim: "具体的なフィードバックで締めくくる。" },
  "インビジブル・キャンプファイヤー": { howto: "①全員で円になり、中央に架空のキャンプファイヤーをイメージ\n②ファシリテーターが火を「つける」ジェスチャー\n③一人ずつ、今日の発見を薪として炎に投げ入れるように語る\n④全員が投げ入れたら、両手を上げる\n⑤最後に火を「消す」ジェスチャーで終了", aim: "体験を象徴的な儀式で締めくくる。" },

};

};
const PHASE_COLORS = { "アイスブレイク": "#D4A017", "メインワーク": "#C8553D", "クロージング": "#2A9D8F" };

function generateCurriculum({ people, purpose, level, duration }) {
  const result = { icebreaker: null, main: [], closing: null, totalDuration: 0 };
  const levelOrder = { "初級": 1, "中級": 2, "上級": 3 };
  const userLevel = levelOrder[level] || 1;
  const validIcebreakers = WORKSHOP_DATA.icebreakers.filter(e => people >= e.minPeople && people <= e.maxPeople && levelOrder[e.level] <= userLevel);
  const validClosings = WORKSHOP_DATA.closings.filter(e => people >= e.minPeople && people <= e.maxPeople);
  const purposeExercises = (WORKSHOP_DATA.mainExercises[purpose] || []).filter(e => people >= e.minPeople && people <= e.maxPeople && levelOrder[e.level] <= userLevel);
  if (validIcebreakers.length > 0) { result.icebreaker = validIcebreakers[Math.floor(Math.random() * validIcebreakers.length)]; result.totalDuration += result.icebreaker.duration; }
  if (validClosings.length > 0) { result.closing = validClosings[Math.floor(Math.random() * validClosings.length)]; result.totalDuration += result.closing.duration; }
  const remainingTime = duration - result.totalDuration - 10;
  let timeUsed = 0;
  const shuffled = [...purposeExercises].sort(() => Math.random() - 0.5);
  for (const ex of shuffled) { if (timeUsed + ex.duration <= remainingTime) { result.main.push(ex); timeUsed += ex.duration; } }
  if (result.main.length < 2 && timeUsed < remainingTime - 15) {
    for (const ex of shuffled) { if (!result.main.find(m => m.name === ex.name) && timeUsed + ex.duration <= remainingTime) { result.main.push(ex); timeUsed += ex.duration; } }
  }
  result.totalDuration = (result.icebreaker?.duration || 0) + timeUsed + (result.closing?.duration || 0);
  return result;
}

function Timeline({ curriculum }) {
  const allItems = []; let currentTime = 0;
  if (curriculum.icebreaker) { allItems.push({ ...curriculum.icebreaker, phase: "アイスブレイク", color: PHASE_COLORS["アイスブレイク"], startTime: currentTime }); currentTime += curriculum.icebreaker.duration; }
  curriculum.main.forEach((ex, i) => { if (i > 0) currentTime += 3; allItems.push({ ...ex, phase: "メインワーク", color: PHASE_COLORS["メインワーク"], startTime: currentTime }); currentTime += ex.duration; });
  if (curriculum.closing) { currentTime += 5; allItems.push({ ...curriculum.closing, phase: "クロージング", color: PHASE_COLORS["クロージング"], startTime: currentTime }); }
  return (
    <div style={{ position: "relative", padding: "0 0 0 110px", marginTop: 24 }}>
      <div style={{ position: "absolute", left: 96, top: 0, bottom: 0, width: 3, background: `linear-gradient(to bottom, ${PHASE_COLORS["アイスブレイク"]}, ${PHASE_COLORS["メインワーク"]}, ${PHASE_COLORS["クロージング"]})`, borderRadius: 2 }} />
      {allItems.map((item, i) => (
        <div key={i} style={{ position: "relative", marginBottom: 18, paddingLeft: 24 }}>
          <div style={{ position: "absolute", left: -110, top: 4, width: 82, textAlign: "right", fontFamily: "'DM Mono', monospace", fontSize: 12, color: C.textMuted, fontWeight: 500 }}>{item.startTime}分〜</div>
          <div style={{ position: "absolute", left: -10, top: 7, width: 11, height: 11, borderRadius: "50%", background: item.color, border: `3px solid ${C.bg}`, boxShadow: `0 0 0 2px ${item.color}44` }} />
          <div style={{ background: C.cardBg, borderRadius: 10, padding: "14px 18px", borderLeft: `4px solid ${item.color}`, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", transition: "transform 0.15s ease" }}
            onMouseEnter={e => { e.currentTarget.style.transform = "translateX(3px)"; e.currentTarget.style.boxShadow = "0 3px 12px rgba(0,0,0,0.08)"; }}
            onMouseLeave={e => { e.currentTarget.style.transform = "translateX(0)"; e.currentTarget.style.boxShadow = "0 1px 4px rgba(0,0,0,0.06)"; }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 3 }}>

              <span style={{ fontSize: 11, color: C.textMuted, fontFamily: "'DM Mono', monospace" }}>{item.duration}分</span>
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 4 }}>{item.name}</div>
            <div style={{ fontSize: 13, color: C.textSub, lineHeight: 1.7 }}>{item.description}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

          </>
        )}
      </div>
      <div style={{ textAlign: "center", padding: "24px", borderTop: `1px solid ${C.border}`, fontSize: 11, color: C.textMuted, fontFamily: "'DM Mono', monospace" }}>Powered by Theater Thinking Method</div>
    </div>
  );
}

ReactDOM.render(<WorkshopGenerator />, document.getElementById('root'));
</script>
</body>
</html>
